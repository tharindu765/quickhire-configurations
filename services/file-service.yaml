server:
  port: 0

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

storage:
  provider: local
  local:
    base-path: uploads
    base-url: http://localhost:8083/files

eureka:
  instance:
    instanceId: ${spring.application.name}:${vcap.application.instance_id:${spring.application.instance_id:${random.value}}}
