server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
            - id: job-service
              uri: lb://JOB-SERVICE
              predicates:
                - Path=/api/jobs/**
            - id: file-service
              uri: lb://FILE-SERVICE
              predicates:
                - Path=/api/files/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowed-methods: "*"
                allowed-headers: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka